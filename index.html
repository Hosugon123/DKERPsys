<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="達客鴨頭" />
    <link rel="icon" type="image/png" href="/brand-logo.png" />
    <link rel="apple-touch-icon" href="/brand-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>DKERPsys 達客東山鴨頭</title>
    <script>
      (function() {
        var theme = 'light';
        try {
          var storedTheme = localStorage.getItem('dongshan_color_theme_v1');
          var themeVersion = localStorage.getItem('dongshan_color_theme_version_v2');
          if (storedTheme === 'light') theme = 'light';
          if (storedTheme === 'dark' && themeVersion === '2') theme = 'dark';
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#f4f1eb' : '#0d0d0d');
      })();
    </script>
    <script>
      // Prevent polyfills (like whatwg-fetch) from crashing the app in iframe environments
      // where window.fetch is a getter-only property.
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(val) {
              console.warn('Ignored attempt to overwrite window.fetch', val);
            }
          });
        } catch (e) {
          console.error('Failed to polyfill fetch setter', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
